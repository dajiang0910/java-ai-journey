spring.application.name=notes-api

# H2 内存数据库连接
spring.datasource.url=jdbc:h2:mem:notesdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 开启 H2 网页控制台
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================
# Spring AI OpenAI 配置 → 实际对接阿里百炼（兼容 OpenAI 格式）
# ============================================

# 阿里百炼 API Key（从 https://bailian.console.aliyun.com 获取）
spring.ai.openai.api-key=${DASHSCOPE_API_KEY:your-api-key-here}

# 百炼兼容 OpenAI 格式的端点
spring.ai.openai.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1

# 模型选择（百炼通义千问系列）
spring.ai.openai.chat.options.model=qwen-turbo

# 温度 0.0~2.0，越低越稳定，越高越随机
spring.ai.openai.chat.options.temperature=0.7