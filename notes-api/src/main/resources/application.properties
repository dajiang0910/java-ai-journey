spring.application.name=notes-api

# H2 内存数据库连接
spring.datasource.url=jdbc:h2:mem:notesdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 开启 H2 网页控制台
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================
# Spring AI OpenAI 配置 → 实际对接阿里百炼（兼容 OpenAI 格式）
# ============================================

# 阿里百炼 API Key（从 https://bailian.console.aliyun.com 获取）
spring.ai.openai.api-key=${DASHSCOPE_API_KEY:your-api-key-here}

# 百炼兼容 OpenAI 格式的端点
spring.ai.openai.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1

# 模型选择（百炼通义千问系列）
spring.ai.openai.chat.options.model=qwen-turbo

# 温度 0.0~2.0，越低越稳定，越高越随机
spring.ai.openai.chat.options.temperature=0.7

# ============================================
# Day 5: 超时 + 重试 + Token 观测
# ============================================

# --- 超时配置 ---
# LLM 调用最大等待时间（HTTP 连接超时），超过此时间直接抛异常
# 默认无超时（依赖 SDK 默认值），生产环境必须设
spring.ai.openai.chat.options.timeout=30s

# --- 重试配置（Spring AI Retry 自动配置） ---
# 最大重试次数（不含首次调用，即总共最多 4 次尝试）
spring.ai.retry.max-attempts=3
# 初始退避间隔（第一次重试前等多久）
spring.ai.retry.backoff.initial-interval=1000ms
# 退避乘数：间隔 = 上次间隔 × multiplier（指数退避）
# 例如：1s → 2s → 4s（第 3 次重试前等 4 秒）
spring.ai.retry.backoff.multiplier=2
# 最大退避间隔（退避上限，防止指数爆炸）
spring.ai.retry.backoff.max-interval=10s
# 是否对 4xx 客户端错误也重试
# false = 只重试 5xx 服务端错误 + 网络异常（推荐）
# true  = 4xx（如 429 限流）也重试
spring.ai.retry.on-client-errors=false

# ============================================
# Week 4 Day 4: 文件上传配置
# ============================================

# 单文件最大大小（10MB，防止恶意上传撑爆磁盘/内存）
spring.servlet.multipart.max-file-size=10MB
# 整个请求最大大小（含所有文件 + 其他表单字段）
spring.servlet.multipart.max-request-size=15MB

# --- Token 观测配置 ---
# 在日志中输出发送给 LLM 的 prompt 内容（调试用，生产建议关）
spring.ai.chat.observations.log-prompt=false
# 在日志中输出 LLM 的完整回复内容（调试用，生产建议关）
spring.ai.chat.observations.log-completion=false

# ============================================
# Week 5 Day 1: Embedding 配置（百炼 text-embedding-v2）
# ============================================

# Embedding 模型（text-embedding-v2: 1536 维，中文效果好）
spring.ai.openai.embedding.options.model=text-embedding-v2

# Embedding 专用超时（向量化比聊天快很多，10s 足够）
spring.ai.openai.embedding.options.timeout=10s

# ============================================
# Week 5 Day 2: Redis + VectorStore 配置
# ============================================

# Redis 连接（Redis Stack）
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Redis VectorStore 配置
spring.ai.vectorstore.redis.index-name=notes-knowledge
spring.ai.vectorstore.redis.prefix=doc:
spring.ai.vectorstore.redis.initialize-schema=true

# HNSW 索引参数（生产级默认值，v1 阶段不调参）
spring.ai.vectorstore.redis.hnsw.m=16
spring.ai.vectorstore.redis.hnsw.ef-construction=200
spring.ai.vectorstore.redis.hnsw.ef-runtime=10